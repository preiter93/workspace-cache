name: Build Workspace with workspace-cache
description: Build a Rust workspace binary with optimized dependency caching
author: workspace-cache

inputs:
  binary:
    description: 'Name of the binary to build'
    required: true
  profile:
    description: 'Build profile (release or debug)'
    required: false
    default: 'debug'
  working-directory:
    description: 'Working directory containing the workspace'
    required: false
    default: '.'
  build-tests:
    description: 'Build test targets to cache dev-dependencies'
    required: false
    default: 'true'


outputs:
  binary-path:
    description: 'Path to the built binary'
    value: ${{ steps.build-info.outputs.binary-path }}

runs:
  using: composite
  steps:
    - name: Generate minimal workspace
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::📦 Generating minimal workspace for ${{ inputs.binary }}"
        workspace-cache deps --bin ${{ inputs.binary }}
        echo "✓ Generated .workspace-cache/"
        echo "::endgroup::"

    - name: Get cache key for dependencies
      id: cache-key
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        HASH="${{ hashFiles(format('{0}/.workspace-cache/Cargo.lock', inputs.working-directory)) }}"
        echo "key=${{ runner.os }}-workspace-cache-deps-${{ inputs.profile }}-${HASH}" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ${{ inputs.working-directory }}/.workspace-cache/target
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: |
          ${{ runner.os }}-workspace-cache-deps-${{ inputs.profile }}-

    - name: Build dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}/.workspace-cache
      run: |
        echo "::group::🔨 Building dependencies (${{ inputs.profile }} profile)"
        PROFILE="${{ inputs.profile }}"
        BUILD_TESTS="${{ inputs.build-tests }}"
        TESTS_FLAG=""
        if [ "$BUILD_TESTS" = "true" ]; then
          TESTS_FLAG="--tests"
        fi

        if [ "$PROFILE" = "debug" ]; then
          cargo build $TESTS_FLAG
        elif [ "$PROFILE" = "release" ]; then
          cargo build --release $TESTS_FLAG
        else
          cargo build --profile "$PROFILE" $TESTS_FLAG
        fi
        echo "::endgroup::"

    - name: Copy real sources
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::📋 Copying workspace members"
        workspace-cache members --bin ${{ inputs.binary }} | while read -r path name; do
          if [ ! -d "$path" ]; then
            echo "❌ Error: Workspace member $path does not exist"
            exit 1
          fi
          rm -rf .workspace-cache/$path
          cp -r $path .workspace-cache/$path
          echo "  ✓ Copied $path (src, migrations, assets, etc.)"
        done
        echo "::endgroup::"

    - name: Build binary
      shell: bash
      working-directory: ${{ inputs.working-directory }}/.workspace-cache
      run: |
        echo "::group::🚀 Building ${{ inputs.binary }} (${{ inputs.profile }} profile)"
        PACKAGES=$(workspace-cache members --bin ${{ inputs.binary }} | awk '{print "-p " $2}' | tr '\n' ' ')
        PROFILE="${{ inputs.profile }}"

        BUILD_TESTS="${{ inputs.build-tests }}"
        TESTS_FLAG=""
        if [ "$BUILD_TESTS" = "true" ]; then
          TESTS_FLAG="--tests"
        fi

        if [ "$PROFILE" = "debug" ]; then
          cargo clean $PACKAGES
          cargo build --bin ${{ inputs.binary }} $TESTS_FLAG
        elif [ "$PROFILE" = "release" ]; then
          cargo clean --release $PACKAGES
          cargo build --release --bin ${{ inputs.binary }} $TESTS_FLAG
        else
          cargo clean --profile "$PROFILE" $PACKAGES
          cargo build --profile "$PROFILE" --bin ${{ inputs.binary }} $TESTS_FLAG
        fi
        echo "::endgroup::"

    - name: Set output
      id: build-info
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        PROFILE="${{ inputs.profile }}"
        if [ "$PROFILE" = "debug" ]; then
          echo "binary-path=.workspace-cache/target/debug/${{ inputs.binary }}" >> $GITHUB_OUTPUT
        else
          echo "binary-path=.workspace-cache/target/$PROFILE/${{ inputs.binary }}" >> $GITHUB_OUTPUT
        fi

branding:
  icon: 'package'
  color: 'orange'
