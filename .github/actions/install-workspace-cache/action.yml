name: Install workspace-cache
description: Install workspace-cache tool with caching
author: workspace-cache

inputs:
  version:
    description: 'Version of workspace-cache to install'
    required: false
    default: '0.1.0'
  install-from-git:
    description: 'Install workspace-cache from git instead of crates.io'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Get cache key
      id: cache-key
      shell: bash
      run: |
        if [ "${{ inputs.install-from-git }}" = "true" ]; then
          echo "key=workspace-cache-git-${{ runner.os }}" >> $GITHUB_OUTPUT
        else
          echo "key=workspace-cache-${{ inputs.version }}-${{ runner.os }}" >> $GITHUB_OUTPUT
        fi

    - name: Cache workspace-cache binary
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/workspace-cache
        key: ${{ steps.cache-key.outputs.key }}

    - name: Cache hit check
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: echo "✅ workspace-cache restored from cache"

    - name: Install workspace-cache
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::group::📥 Installing workspace-cache"
        if [ "${{ inputs.install-from-git }}" = "true" ]; then
          echo "📦 Installing from git (latest)..."
          cargo install --git https://github.com/preiter93/workspace-cache workspace-cache
        else
          echo "📦 Installing version ${{ inputs.version }} from crates.io..."
          cargo install workspace-cache@${{ inputs.version }}
        fi
        echo "::endgroup::"

    - name: Verify installation
      shell: bash
      run: |
        VERSION=$(workspace-cache --version)
        echo "✓ $VERSION"

branding:
  icon: 'download'
  color: 'blue'
