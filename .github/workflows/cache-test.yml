name: Cache Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    name: Build ${{ matrix.binary }} binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [user, order]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install workspace-cache
        uses: ./.github/actions/install-workspace-cache
        with:
          install-from-git: true

      - name: Build ${{ matrix.binary }}
        id: build
        uses: ./.github/actions/build-workspace
        with:
          binary: ${{ matrix.binary }}
          working-directory: examples/workspace

      - name: Run tests
        working-directory: examples/workspace/.workspace-cache
        run: cargo test -p ${{ matrix.binary }} --verbose

      - name: Clippy
        working-directory: examples/workspace/.workspace-cache
        run: cargo clippy -p ${{ matrix.binary }} -- -D warnings

      - name: Verify binary
        working-directory: examples/workspace
        run: ${{ steps.build.outputs.binary-path }}
