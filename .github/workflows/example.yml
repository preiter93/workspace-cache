name: Example

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  example:
    name: Build example workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            examples/workspace/.workspace-cache -> target
          cache-on-failure: true

      - name: Build workspace-cache
        run: cargo build --release --manifest-path ../../Cargo.toml

      - name: Generate minimal workspace for api binary
        run: ../../target/release/workspace-cache deps --bin api

      - name: Build dependencies (cached layer)
        run: cargo build --release
        working-directory: examples/workspace/.workspace-cache

      - name: Copy real sources
        run: |
          rm -rf .workspace-cache/crates/api/src .workspace-cache/crates/common/src .workspace-cache/crates/utils/src
          cp -r crates/api/src .workspace-cache/crates/api/src
          cp -r crates/common/src .workspace-cache/crates/common/src
          cp -r crates/utils/src .workspace-cache/crates/utils/src

      - name: Build api binary
        run: |
          cargo clean --release -p api -p common -p utils
          cargo build --release --bin api
        working-directory: examples/workspace/.workspace-cache

      - name: Verify binary
        run: .workspace-cache/target/release/api